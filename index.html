<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UAIL Interactive Keyword Cloud - Homepage Fit</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Lato, Arial, Helvetica, sans-serif;
    overflow: hidden;
  }

  .uail-keyword-cloud {
    position: relative;
    width: 100%;
    height: 330px;
    min-height: 260px;
    overflow: hidden;
    background: transparent;
    user-select: none;
    cursor: default;
  }

  .uail-word {
    position: absolute;
    left: var(--x);
    top: var(--y);
    transform: translate(-50%, -50%);
    color: var(--color);
    font-size: var(--size);
    font-weight: var(--weight);
    letter-spacing: 0.01em;
    line-height: 1;
    white-space: nowrap;
    opacity: var(--opacity);
    filter: blur(var(--blur));
    text-shadow:
      0 0 8px rgba(255,255,255,0.18),
      0 0 18px rgba(67, 168, 255, 0.18);
    will-change: transform, opacity, filter;
    transition:
      opacity 0.35s ease,
      filter 0.35s ease,
      color 0.35s ease,
      text-shadow 0.35s ease;
    animation: uailFloat var(--float-duration) ease-in-out infinite alternate;
    pointer-events: none;
  }

  .uail-word.is-near {
    opacity: 1;
    filter: blur(0);
    color: #ffffff;
    text-shadow:
      0 0 14px rgba(255,255,255,0.35),
      0 0 28px rgba(104, 199, 255, 0.35);
  }

  @keyframes uailFloat {
    from { margin-top: -3px; }
    to { margin-top: 3px; }
  }

  @media (max-width: 1200px) {
    .uail-keyword-cloud { height: 300px; }
    .uail-word { font-size: calc(var(--size) * 0.88); }
  }

  @media (max-width: 900px) {
    .uail-keyword-cloud { height: 270px; }
    .uail-word { font-size: calc(var(--size) * 0.75); }
  }

  @media (max-width: 600px) {
    .uail-keyword-cloud { height: 240px; }
    .uail-word { font-size: calc(var(--size) * 0.58); }
  }
</style>
</head>
<body>
<section class="uail-keyword-cloud" id="uailKeywordCloud" aria-label="Interactive keyword cloud for underwater acoustics intelligence research">

  <!-- Main cluster positioned to avoid a typical center title block and corner callout cards -->
  <span class="uail-word" style="--x:27%;--y:45%;--size:31px;--weight:760;--color:#ffffff;--opacity:0.92;--blur:0.05px;--float-duration:4.1s" data-depth="24">Passive Sonar</span>
  <span class="uail-word" style="--x:72%;--y:41%;--size:30px;--weight:740;--color:#eef8ff;--opacity:0.9;--blur:0.08px;--float-duration:4.6s" data-depth="23">Active Sonar</span>

  <span class="uail-word" style="--x:39%;--y:59%;--size:37px;--weight:800;--color:#ffffff;--opacity:0.96;--blur:0px;--float-duration:3.9s" data-depth="32">Underwater Acoustics</span>
  <span class="uail-word" style="--x:63%;--y:59%;--size:35px;--weight:780;--color:#f4fbff;--opacity:0.94;--blur:0.04px;--float-duration:4.3s" data-depth="30">Target Detection</span>

  <span class="uail-word" style="--x:29%;--y:73%;--size:24px;--weight:640;--color:#d8efff;--opacity:0.78;--blur:0.28px;--float-duration:4.8s" data-depth="18">Beamforming</span>
  <span class="uail-word" style="--x:42%;--y:75%;--size:26px;--weight:660;--color:#d8efff;--opacity:0.8;--blur:0.24px;--float-duration:5.1s" data-depth="18">DOA Estimation</span>
  <span class="uail-word" style="--x:56%;--y:75%;--size:25px;--weight:650;--color:#d8efff;--opacity:0.78;--blur:0.26px;--float-duration:4.7s" data-depth="18">Signal Processing</span>
  <span class="uail-word" style="--x:71%;--y:74%;--size:24px;--weight:640;--color:#d8efff;--opacity:0.76;--blur:0.3px;--float-duration:5.0s" data-depth="18">Source Localization</span>

  <span class="uail-word" style="--x:20%;--y:61%;--size:21px;--weight:620;--color:#bfe1ff;--opacity:0.66;--blur:0.48px;--float-duration:4.9s" data-depth="14">Scattering</span>
  <span class="uail-word" style="--x:79%;--y:60%;--size:21px;--weight:620;--color:#bfe1ff;--opacity:0.66;--blur:0.48px;--float-duration:5.2s" data-depth="14">Reverberation</span>

  <span class="uail-word" style="--x:35%;--y:88%;--size:22px;--weight:620;--color:#a6d2ff;--opacity:0.6;--blur:0.6px;--float-duration:5.4s" data-depth="12">Acoustic Propagation</span>
  <span class="uail-word" style="--x:51%;--y:89%;--size:21px;--weight:610;--color:#a6d2ff;--opacity:0.58;--blur:0.66px;--float-duration:5.8s" data-depth="11">Array Processing</span>
  <span class="uail-word" style="--x:65%;--y:88%;--size:22px;--weight:620;--color:#a6d2ff;--opacity:0.6;--blur:0.6px;--float-duration:5.3s" data-depth="12">Ship Classification</span>
  <span class="uail-word" style="--x:50%;--y:20%;--size:20px;--weight:600;--color:#c6e6ff;--opacity:0.64;--blur:0.42px;--float-duration:5.7s" data-depth="11">Machine Learning</span>
  <span class="uail-word" style="--x:58%;--y:32%;--size:19px;--weight:600;--color:#b1dbff;--opacity:0.58;--blur:0.55px;--float-duration:5.0s" data-depth="10">Frequency Analysis</span>

</section>

<script>
(function () {
  const cloud = document.getElementById("uailKeywordCloud");
  const words = Array.from(cloud.querySelectorAll(".uail-word"));

  let targetX = 0;
  let targetY = 0;
  let currentX = 0;
  let currentY = 0;
  let hasPointer = false;

  function updateTarget(clientX, clientY) {
    const rect = cloud.getBoundingClientRect();
    targetX = ((clientX - rect.left) / rect.width - 0.5) * 2;
    targetY = ((clientY - rect.top) / rect.height - 0.5) * 2;
    hasPointer = true;

    words.forEach((word) => {
      const wRect = word.getBoundingClientRect();
      const wx = wRect.left + wRect.width / 2;
      const wy = wRect.top + wRect.height / 2;
      const dx = clientX - wx;
      const dy = clientY - wy;
      const distance = Math.sqrt(dx * dx + dy * dy);
      word.classList.toggle("is-near", distance < 150);
    });
  }

  cloud.addEventListener("mousemove", (event) => updateTarget(event.clientX, event.clientY));
  cloud.addEventListener("touchmove", (event) => {
    if (event.touches && event.touches[0]) {
      updateTarget(event.touches[0].clientX, event.touches[0].clientY);
    }
  }, { passive: true });

  cloud.addEventListener("mouseleave", () => {
    hasPointer = false;
    targetX = 0;
    targetY = 0;
    words.forEach((word) => word.classList.remove("is-near"));
  });

  function animate() {
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;

    words.forEach((word, index) => {
      const depth = Number(word.dataset.depth || 12);
      const phase = index * 0.63;
      const idleX = hasPointer ? 0 : Math.sin(Date.now() / 1500 + phase) * 2.5;
      const idleY = hasPointer ? 0 : Math.cos(Date.now() / 1700 + phase) * 2.5;

      const moveX = currentX * depth + idleX;
      const moveY = currentY * depth * 0.60 + idleY;

      word.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
    });

    requestAnimationFrame(animate);
  }

  animate();
})();
</script>
</body>
</html>
