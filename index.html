<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UAIL Interactive Keyword Cloud - Lower Spread No Overlap</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Lato, Arial, Helvetica, sans-serif;
    overflow: hidden;
  }

  .uail-keyword-cloud {
    position: relative;
    width: 100%;
    height: 390px;
    min-height: 320px;
    overflow: hidden;
    background: transparent;
    user-select: none;
    cursor: default;
  }

  .uail-word {
    position: absolute;
    left: var(--x);
    top: var(--y);
    transform: translate(-50%, -50%);
    color: var(--color);
    font-size: var(--size);
    font-weight: var(--weight);
    letter-spacing: 0.01em;
    line-height: 1;
    white-space: nowrap;
    opacity: var(--opacity);
    filter: blur(var(--blur));
    text-shadow:
      0 0 8px rgba(255,255,255,0.18),
      0 0 18px rgba(67, 168, 255, 0.18);
    will-change: transform, opacity, filter;
    transition:
      opacity 0.35s ease,
      filter 0.35s ease,
      color 0.35s ease,
      text-shadow 0.35s ease;
    animation: uailFloat var(--float-duration) ease-in-out infinite alternate;
    pointer-events: none;
  }

  .uail-word.is-near {
    opacity: 1;
    filter: blur(0);
    color: #ffffff;
    text-shadow:
      0 0 14px rgba(255,255,255,0.35),
      0 0 28px rgba(104, 199, 255, 0.35);
  }

  @keyframes uailFloat {
    from { margin-top: -3px; }
    to { margin-top: 3px; }
  }

  @media (max-width: 1200px) {
    .uail-keyword-cloud { height: 360px; }
    .uail-word { font-size: calc(var(--size) * 0.88); }
  }

  @media (max-width: 900px) {
    .uail-keyword-cloud { height: 330px; }
    .uail-word { font-size: calc(var(--size) * 0.76); }
  }

  @media (max-width: 600px) {
    .uail-keyword-cloud { height: 290px; }
    .uail-word { font-size: calc(var(--size) * 0.60); }
  }
</style>
</head>
<body>
<section class="uail-keyword-cloud" id="uailKeywordCloud" aria-label="Interactive keyword cloud for underwater acoustics intelligence research">

  <!-- Top of cluster kept lower than the large hero title -->
  <span class="uail-word" style="--x:18%;--y:58%;--size:19px;--weight:620;--color:#bfe1ff;--opacity:0.66;--blur:0.45px;--float-duration:4.9s" data-depth="12">Scattering</span>
  <span class="uail-word" style="--x:28%;--y:54%;--size:27px;--weight:760;--color:#ffffff;--opacity:0.90;--blur:0.08px;--float-duration:4.1s" data-depth="22">Passive Sonar</span>
  <span class="uail-word" style="--x:50%;--y:50%;--size:17px;--weight:600;--color:#c6e6ff;--opacity:0.62;--blur:0.40px;--float-duration:5.4s" data-depth="9">Frequency Analysis</span>
  <span class="uail-word" style="--x:72%;--y:54%;--size:26px;--weight:740;--color:#eef8ff;--opacity:0.89;--blur:0.10px;--float-duration:4.5s" data-depth="21">Active Sonar</span>
  <span class="uail-word" style="--x:82%;--y:58%;--size:19px;--weight:620;--color:#bfe1ff;--opacity:0.66;--blur:0.45px;--float-duration:5.1s" data-depth="12">Reverberation</span>

  <!-- Main center band -->
  <span class="uail-word" style="--x:37%;--y:67%;--size:32px;--weight:800;--color:#ffffff;--opacity:0.95;--blur:0px;--float-duration:3.9s" data-depth="27">Underwater Acoustics</span>
  <span class="uail-word" style="--x:66%;--y:67%;--size:30px;--weight:790;--color:#f4fbff;--opacity:0.94;--blur:0.04px;--float-duration:4.2s" data-depth="26">Target Detection</span>

  <!-- Lower support band -->
  <span class="uail-word" style="--x:22%;--y:79%;--size:22px;--weight:640;--color:#d8efff;--opacity:0.78;--blur:0.26px;--float-duration:4.8s" data-depth="17">Beamforming</span>
  <span class="uail-word" style="--x:37%;--y:79%;--size:24px;--weight:660;--color:#d8efff;--opacity:0.80;--blur:0.23px;--float-duration:5.0s" data-depth="17">DOA Estimation</span>
  <span class="uail-word" style="--x:53%;--y:79%;--size:23px;--weight:650;--color:#d8efff;--opacity:0.79;--blur:0.24px;--float-duration:4.7s" data-depth="17">Signal Processing</span>
  <span class="uail-word" style="--x:72%;--y:79%;--size:22px;--weight:640;--color:#d8efff;--opacity:0.77;--blur:0.28px;--float-duration:5.0s" data-depth="17">Source Localization</span>

  <!-- Bottom spread -->
  <span class="uail-word" style="--x:22%;--y:92%;--size:19px;--weight:610;--color:#a6d2ff;--opacity:0.60;--blur:0.56px;--float-duration:5.3s" data-depth="11">Acoustic Propagation</span>
  <span class="uail-word" style="--x:41%;--y:92%;--size:19px;--weight:610;--color:#a6d2ff;--opacity:0.59;--blur:0.58px;--float-duration:5.6s" data-depth="10">Array Processing</span>
  <span class="uail-word" style="--x:60%;--y:92%;--size:19px;--weight:610;--color:#a6d2ff;--opacity:0.59;--blur:0.58px;--float-duration:5.2s" data-depth="10">Ship Classification</span>
  <span class="uail-word" style="--x:79%;--y:92%;--size:18px;--weight:600;--color:#a6d2ff;--opacity:0.58;--blur:0.60px;--float-duration:5.5s" data-depth="10">Machine Learning</span>

</section>

<script>
(function () {
  const cloud = document.getElementById("uailKeywordCloud");
  const words = Array.from(cloud.querySelectorAll(".uail-word"));

  let targetX = 0;
  let targetY = 0;
  let currentX = 0;
  let currentY = 0;
  let hasPointer = false;

  function updateTarget(clientX, clientY) {
    const rect = cloud.getBoundingClientRect();
    targetX = ((clientX - rect.left) / rect.width - 0.5) * 2;
    targetY = ((clientY - rect.top) / rect.height - 0.5) * 2;
    hasPointer = true;

    words.forEach((word) => {
      const wRect = word.getBoundingClientRect();
      const wx = wRect.left + wRect.width / 2;
      const wy = wRect.top + wRect.height / 2;
      const dx = clientX - wx;
      const dy = clientY - wy;
      const distance = Math.sqrt(dx * dx + dy * dy);
      word.classList.toggle("is-near", distance < 140);
    });
  }

  cloud.addEventListener("mousemove", (event) => updateTarget(event.clientX, event.clientY));
  cloud.addEventListener("touchmove", (event) => {
    if (event.touches && event.touches[0]) {
      updateTarget(event.touches[0].clientX, event.touches[0].clientY);
    }
  }, { passive: true });

  cloud.addEventListener("mouseleave", () => {
    hasPointer = false;
    targetX = 0;
    targetY = 0;
    words.forEach((word) => word.classList.remove("is-near"));
  });

  function animate() {
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;

    words.forEach((word, index) => {
      const depth = Number(word.dataset.depth || 10);
      const phase = index * 0.63;
      const idleX = hasPointer ? 0 : Math.sin(Date.now() / 1500 + phase) * 2.2;
      const idleY = hasPointer ? 0 : Math.cos(Date.now() / 1700 + phase) * 2.2;

      const moveX = currentX * depth + idleX;
      const moveY = currentY * depth * 0.58 + idleY;

      word.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
    });

    requestAnimationFrame(animate);
  }

  animate();
})();
</script>
</body>
</html>
